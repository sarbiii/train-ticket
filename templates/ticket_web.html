<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KTX / SRT 취소표 스나이퍼</title>
  <style>
    :root {
      --blue:      #1d4ed8;
      --blue-dark: #1e3a8a;
      --green:     #15803d;
      --green-bg:  #f0fdf4;
      --green-bd:  #86efac;
      --red:       #dc2626;
      --red-bg:    #fef2f2;
      --yellow:    #b45309;
      --yellow-bg: #fffbeb;
      --gray-50:   #f9fafb;
      --gray-100:  #f3f4f6;
      --gray-200:  #e5e7eb;
      --gray-400:  #9ca3af;
      --gray-600:  #4b5563;
      --gray-800:  #1f2937;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      font-size: 15px;
      line-height: 1.5;
    }
    header {
      background: linear-gradient(135deg, var(--blue-dark), var(--blue));
      color: #fff;
      padding: 1.125rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.125rem; font-weight: 700; letter-spacing: -0.02em; }
    header p  { font-size: 0.8125rem; opacity: 0.75; margin-top: 0.125rem; }

    /* 알림 허용 버튼 */
    #notif-btn {
      flex-shrink: 0;
      padding: 0.4rem 0.875rem;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 8px;
      color: #fff;
      font-size: 0.8125rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    #notif-btn:hover { background: rgba(255,255,255,0.25); }
    #notif-btn.granted { background: rgba(34,197,94,0.3); border-color: rgba(34,197,94,0.6); }

    .container { max-width: 760px; margin: 1.75rem auto 3rem; padding: 0 1rem; }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
    }
    .card-title {
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.875rem; }
    .field { display: flex; flex-direction: column; gap: 0.375rem; }
    .field label { font-size: 0.8125rem; font-weight: 600; color: var(--gray-600); }
    input[type=text], input[type=password], input[type=date], input[type=time], input[type=number], select {
      width: 100%;
      padding: 0.625rem 0.75rem;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: 0.9375rem;
      font-family: inherit;
      color: var(--gray-800);
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }
    input:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(29,78,216,0.1);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      padding: 0.6875rem 1.25rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--blue); color: #fff; width: 100%; margin-top: 1.125rem; }
    .btn-primary:hover { background: #1e40af; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-stop { background: var(--red); color: #fff; padding: 0.5rem 1rem; font-size: 0.875rem; }
    .btn-stop:hover { background: #b91c1c; }
    .btn-sm {
      padding: 0.3125rem 0.75rem;
      font-size: 0.8125rem;
      background: var(--gray-100);
      color: var(--gray-600);
      border: 1.5px solid var(--gray-200);
      border-radius: 6px;
    }
    .btn-sm:hover { background: var(--gray-200); }
    .error-box {
      margin-top: 0.875rem;
      padding: 0.75rem 1rem;
      background: var(--red-bg);
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: var(--red);
      font-size: 0.875rem;
    }
    .train-table { width: 100%; border-collapse: collapse; margin-bottom: 0.5rem; }
    .train-table th {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gray-600);
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 2px solid var(--gray-200);
    }
    .train-table td {
      padding: 0.75rem;
      border-bottom: 1px solid var(--gray-100);
      vertical-align: middle;
    }
    .train-table tr:last-child td { border-bottom: none; }
    .train-table tr:hover td { background: var(--gray-50); }
    .train-table input[type=checkbox] { width: 1rem; height: 1rem; cursor: pointer; accent-color: var(--blue); }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
    .badge-sold { background: #fee2e2; color: var(--red); }
    .badge-seat { background: #dcfce7; color: var(--green); }
    .badge-wait { background: var(--yellow-bg); color: var(--yellow); }
    .table-actions { display: flex; gap: 0.5rem; margin-bottom: 0.875rem; }
    .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.875rem; }
    .log-title { font-size: 0.9375rem; font-weight: 700; color: var(--blue); display: flex; align-items: center; gap: 0.5rem; }
    .pill { background: var(--gray-100); color: var(--gray-600); font-size: 0.75rem; font-weight: 600; padding: 0.2rem 0.625rem; border-radius: 9999px; }
    .pill.running { background: #dbeafe; color: var(--blue); }
    .log-box {
      background: #0f172a;
      color: #cbd5e1;
      border-radius: 10px;
      padding: 0.875rem 1rem;
      font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
      font-size: 0.8125rem;
      line-height: 1.7;
      height: 320px;
      overflow-y: auto;
      scroll-behavior: smooth;
    }
    .log-box::-webkit-scrollbar { width: 6px; }
    .log-box::-webkit-scrollbar-track { background: transparent; }
    .log-box::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .log-ts      { color: #475569; margin-right: 0.5rem; user-select: none; }
    .log-info    { color: #cbd5e1; }
    .log-warn    { color: #fbbf24; }
    .log-success { color: #4ade80; font-weight: 700; }
    .log-error   { color: #f87171; }
    .success-card {
      background: var(--green-bg);
      border: 2px solid var(--green-bd);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .success-title { font-size: 1.125rem; font-weight: 700; color: var(--green); margin-bottom: 1.125rem; }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 0.625rem 0; border-bottom: 1px solid var(--green-bd); }
    .info-row:last-of-type { border-bottom: none; }
    .info-label { font-size: 0.875rem; color: var(--gray-600); }
    .info-value { font-weight: 700; font-size: 0.9375rem; }
    .pay-warning { margin-top: 1.125rem; padding: 0.75rem 1rem; background: #fef9c3; border: 1px solid #fde047; border-radius: 8px; color: var(--yellow); font-size: 0.875rem; font-weight: 600; }
    .spinner { display: inline-block; width: 0.9375rem; height: 0.9375rem; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.running { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.25); animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 3px rgba(34,197,94,0.25); } 50% { box-shadow: 0 0 0 6px rgba(34,197,94,0.1); } }
    /* ── 열차 토글 ── */
    .train-type-toggle {
      display: flex;
      gap: 0;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      overflow: hidden;
      width: fit-content;
    }
    .toggle-btn {
      padding: 0.5rem 1.25rem;
      border: none;
      background: #fff;
      color: var(--gray-600);
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-btn + .toggle-btn { border-left: 1.5px solid var(--gray-200); }
    .toggle-btn.active { background: var(--blue); color: #fff; }

    .hidden { display: none !important; }
    @media (max-width: 540px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      header h1 { font-size: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🚄 KTX / SRT 취소표 스나이퍼</h1>
    <p>로컬 실행 전용 — 로그인 정보는 저장하지 않음</p>
  </div>
  <button id="notif-btn" onclick="requestNotifPermission()">🔔 알림 허용</button>
</header>

<div class="container">

  <!-- ① 로그인 -->
  <div class="card" id="card-login">
    <div class="card-title">① 로그인</div>
    <div class="grid-2">
      <div class="field">
        <label id="login-id-label">Korail ID</label>
        <input type="text" id="login-id" autocomplete="username" placeholder="회원번호 / 이메일 / 휴대폰번호">
      </div>
      <div class="field">
        <label id="login-password-label">Korail 비밀번호</label>
        <input type="password" id="login-password" autocomplete="current-password" placeholder="비밀번호">
      </div>
    </div>
  </div>

  <!-- ② 열차 조회 -->
  <div class="card" id="card-search">
    <div class="card-title">② 열차 조회</div>

    <!-- 열차 종류 선택 -->
    <div style="margin-bottom:1rem">
      <div class="train-type-toggle">
        <button class="toggle-btn active" id="btn-ktx" onclick="setTrainType('ktx')">🚄 KTX</button>
        <button class="toggle-btn"        id="btn-srt" onclick="setTrainType('srt')">🚅 SRT</button>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:.875rem">
      <div class="field">
        <label>출발역</label>
        <input type="text" id="dep" placeholder="서울" value="서울">
      </div>
      <div class="field">
        <label>도착역</label>
        <input type="text" id="arr" placeholder="부산" value="부산">
      </div>
    </div>
    <div class="grid-3" style="margin-bottom:.875rem">
      <div class="field">
        <label>날짜</label>
        <input type="date" id="date">
      </div>
      <div class="field">
        <label>시작 시각</label>
        <input type="time" id="from-time" value="09:00">
      </div>
      <div class="field">
        <label>종료 시각</label>
        <input type="time" id="to-time" value="23:59">
      </div>
    </div>
    <div class="grid-2" style="margin-bottom:.875rem">
      <div class="field">
        <label>성인 인원</label>
        <input type="number" id="passenger-count" value="1" min="1" max="4">
      </div>
    </div>
    <button class="btn btn-primary" id="btn-search" onclick="doSearch()">열차 조회</button>
    <div class="error-box hidden" id="search-error"></div>
  </div>

  <!-- ③ 열차 선택 -->
  <div class="card hidden" id="card-trains">
    <div class="card-title">
      <span>③ 스나이핑할 열차 선택</span>
      <span id="train-count" style="font-size:.8125rem;font-weight:500;color:var(--gray-400)"></span>
    </div>
    <div class="table-actions">
      <button class="btn btn-sm" onclick="selectAll(true)">전체 선택</button>
      <button class="btn btn-sm" onclick="selectAll(false)">전체 해제</button>
      <button class="btn btn-sm" onclick="selectSoldOnly()">매진만 선택</button>
    </div>
    <table class="train-table">
      <thead>
        <tr>
          <th style="width:2.5rem"></th>
          <th>열차번호</th>
          <th>출발</th>
          <th>도착</th>
          <th>좌석 상태</th>
        </tr>
      </thead>
      <tbody id="train-tbody"></tbody>
    </table>
  </div>

  <!-- ④ 옵션 -->
  <div class="card hidden" id="card-options">
    <div class="card-title">④ 옵션</div>
    <div class="grid-2" style="margin-bottom:.875rem">
      <div class="field">
        <label>좌석 선호</label>
        <select id="seat-option">
          <option value="general-first">일반석 우선</option>
          <option value="general-only">일반석만</option>
          <option value="special-first">특실 우선</option>
          <option value="special-only">특실만</option>
        </select>
      </div>
      <div class="field">
        <label>폴링 간격 (초, 최소 30)</label>
        <input type="number" id="interval" value="45" min="30" max="300">
      </div>
    </div>
    <div class="field" style="margin-bottom:0">
      <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.9rem;font-weight:500;color:var(--gray-800)">
        <input type="checkbox" id="try-waiting" style="width:auto;height:auto;accent-color:var(--blue)">
        좌석 없으면 예약대기도 시도
      </label>
    </div>
    <button class="btn btn-primary" id="btn-start" onclick="doStart()">🎯 스나이핑 시작</button>
    <div class="error-box hidden" id="start-error"></div>
  </div>

  <!-- ④ 실시간 로그 -->
  <div class="card hidden" id="card-log">
    <div class="log-header">
      <div class="log-title">
        <span class="dot running" id="dot"></span>
        실시간 상태
        <span class="pill running" id="poll-pill">대기 중</span>
      </div>
      <button class="btn btn-stop" onclick="doStop()">■ 중단</button>
    </div>
    <div class="log-box" id="log-box"></div>
  </div>

  <!-- 성공 -->
  <div class="success-card hidden" id="card-success">
    <div class="success-title">✅ 예약 성공!</div>
    <div id="success-body"></div>
    <div class="pay-warning">⚠ Korail 앱 또는 www.letskorail.com 에서 결제 기한 내에 결제를 완료하세요!</div>
  </div>

</div>

<script>
  // ── 날짜 기본값 ───────────────────────────────────────────────────────────
  (function () {
    const today = new Date();
    const yyyy  = today.getFullYear();
    const mm    = String(today.getMonth() + 1).padStart(2, '0');
    const dd    = String(today.getDate()).padStart(2, '0');
    document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;
  })();

  // ── 브라우저 알림 권한 ────────────────────────────────────────────────────
  (function checkNotifPermission() {
    const btn = document.getElementById('notif-btn');
    if (!('Notification' in window)) {
      btn.textContent = '🔕 알림 미지원';
      btn.disabled = true;
      return;
    }
    if (Notification.permission === 'granted') {
      btn.textContent = '🔔 알림 ON';
      btn.classList.add('granted');
    }
  })();

  async function requestNotifPermission() {
    if (!('Notification' in window)) return;
    const perm = await Notification.requestPermission();
    const btn  = document.getElementById('notif-btn');
    if (perm === 'granted') {
      btn.textContent = '🔔 알림 ON';
      btn.classList.add('granted');
    } else {
      btn.textContent = '🔕 알림 거부됨';
    }
  }

  // ── Web Audio 비프음 ──────────────────────────────────────────────────────
  function playBeep() {
    try {
      const ctx  = new (window.AudioContext || window.webkitAudioContext)();
      // 세 번 울리는 비프
      [0, 0.35, 0.7].forEach(offset => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.4, ctx.currentTime + offset);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.3);
        osc.start(ctx.currentTime + offset);
        osc.stop(ctx.currentTime + offset + 0.3);
      });
    } catch (e) {}
  }

  // ── 브라우저 푸시 알림 ────────────────────────────────────────────────────
  function sendBrowserNotification(r) {
    playBeep();
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    new Notification(`🎉 ${r.train_type || '열차'} 예약 성공!`, {
      body: `${r.dep_name} ${r.dep_time} → ${r.arr_name} ${r.arr_time}\n결제기한: ${r.buy_limit_date} ${r.buy_limit_time}`,
      requireInteraction: true,
    });
  }

  // ── 열차 종류 ─────────────────────────────────────────────────────────────
  let trainType = 'ktx';

  function setTrainType(type) {
    if (type !== trainType) saveCurrentLogin();
    trainType = type;
    document.getElementById('btn-ktx').classList.toggle('active', type === 'ktx');
    document.getElementById('btn-srt').classList.toggle('active', type === 'srt');
    document.getElementById('login-id-label').textContent = type === 'srt' ? 'SRT ID' : 'Korail ID';
    document.getElementById('login-password-label').textContent = type === 'srt' ? 'SRT 비밀번호' : 'Korail 비밀번호';
    // 출발역 기본값 변경
    const depEl = document.getElementById('dep');
    if (type === 'srt' && depEl.value === '서울') depEl.value = '수서';
    if (type === 'ktx' && depEl.value === '수서') depEl.value = '서울';
    restoreLogin(type);
  }

  // ── 유틸 ─────────────────────────────────────────────────────────────────
  let trainData   = [];
  let eventSource = null;
  let streamClosed = true;
  let pollAttempt = 0;
  const LOGIN_STORE_KEY = 'trainTicketLoginV1';

  const $ = id => document.getElementById(id);
  function show(id) { $(id).classList.remove('hidden'); }
  function hide(id) { $(id).classList.add('hidden'); }
  function showError(id, msg) { const el=$(id); el.textContent=msg; el.classList.remove('hidden'); }
  function hideError(id) { $(id).classList.add('hidden'); }
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function toDateParam(v) { return v.replace(/-/g, ''); }
  function toTimeParam(v) { return v.replace(':', '') + '00'; }
  function fromDateParam(v) {
    return v && v.length === 8 ? `${v.slice(0, 4)}-${v.slice(4, 6)}-${v.slice(6, 8)}` : v;
  }
  function fromTimeParam(v) {
    return v && v.length >= 4 ? `${v.slice(0, 2)}:${v.slice(2, 4)}` : v;
  }
  function clampPassengerCount(v) {
    const n = parseInt(v, 10);
    if (!Number.isFinite(n)) return 1;
    return Math.min(4, Math.max(1, n));
  }
  function readSavedLogins() {
    try { return JSON.parse(localStorage.getItem(LOGIN_STORE_KEY) || '{}') || {}; }
    catch (_) { return {}; }
  }
  function saveCurrentLogin() {
    const idEl = $('login-id');
    const pwEl = $('login-password');
    if (!idEl || !pwEl) return;
    const saved = readSavedLogins();
    saved[trainType] = { userId: idEl.value.trim(), password: pwEl.value };
    localStorage.setItem(LOGIN_STORE_KEY, JSON.stringify(saved));
  }
  function restoreLogin(type = trainType) {
    const saved = readSavedLogins()[type] || {};
    $('login-id').value = saved.userId || '';
    $('login-password').value = saved.password || '';
  }

  async function restoreState() {
    try {
      const res = await fetch('/api/state', { cache: 'no-store' });
      if (!res.ok) return;
      const state = await res.json();
      restoreSearch(state.search, state.snipe);
      restoreRunState(state);
    } catch (_) {}
  }

  function restoreSearch(search, snipe) {
    if (!search || !search.params || !Array.isArray(search.trains)) return;
    const p = search.params;
    setTrainType(p.train_type || 'ktx');
    if (p.dep) $('dep').value = p.dep;
    if (p.arr) $('arr').value = p.arr;
    if (p.date) $('date').value = fromDateParam(p.date);
    if (p.from_time) $('from-time').value = fromTimeParam(p.from_time);
    if (p.to_time) $('to-time').value = fromTimeParam(p.to_time);
    if (p.passenger_count) $('passenger-count').value = clampPassengerCount(p.passenger_count);

    trainData = search.trains;
    renderTrains(trainData);
    restoreSelectedTrains(snipe);
    show('card-trains');
    show('card-options');
  }

  function restoreSelectedTrains(snipe) {
    const ids = new Set((snipe && snipe.payload && snipe.payload.train_ids) || []);
    if (!ids.size) return;
    document.querySelectorAll('.train-chk').forEach(c => { c.checked = ids.has(c.value); });
    const p = snipe.payload || {};
    if (p.seat_option) $('seat-option').value = p.seat_option;
    if (p.interval) $('interval').value = p.interval;
    if (p.passenger_count) $('passenger-count').value = clampPassengerCount(p.passenger_count);
    $('try-waiting').checked = !!p.try_waiting;
  }

  function restoreRunState(state) {
    const logs = Array.isArray(state.logs) ? state.logs : [];
    if (!state.running && !logs.length && !state.success) return;

    show('card-log');
    $('log-box').innerHTML = '';
    logs.forEach(renderHistoricalMsg);

    if (state.last_poll && state.last_poll.attempt) {
      pollAttempt = state.last_poll.attempt;
      $('poll-pill').textContent = `${state.last_poll.attempt}번째 조회`;
    }
    if (state.success) {
      showSuccess(state.success);
    }
    if (state.running) {
      $('dot').classList.add('running');
      $('poll-pill').classList.add('running');
      $('poll-pill').textContent = pollAttempt ? `${pollAttempt}번째 조회` : '실행 중';
      const btn = $('btn-start');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 실행 중…';
      startStream();
    } else {
      stopStream();
      resetStartBtn();
    }
  }

  function renderHistoricalMsg(msg) {
    switch (msg.type) {
      case 'log':
        addLog(msg.msg, msg.level, msg.ts);
        break;
      case 'error':
        addLog(msg.msg, 'error');
        break;
      case 'done':
        addLog('스나이퍼 종료', 'warn');
        break;
    }
  }

  // ── 열차 조회 ─────────────────────────────────────────────────────────────
  async function doSearch() {
    const btn = $('btn-search');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 조회 중…';
    hideError('search-error');
    hide('card-trains');
    hide('card-options');

    const dep  = $('dep').value.trim();
    const arr  = $('arr').value.trim();
    const date = $('date').value;
    const from = $('from-time').value;
    const to   = $('to-time').value;
    const userId = $('login-id').value.trim();
    const password = $('login-password').value;
    const passengerCount = clampPassengerCount($('passenger-count').value);
    $('passenger-count').value = passengerCount;

    if (!userId || !password || !dep || !arr || !date) {
      showError('search-error', '로그인 ID, 비밀번호, 출발역, 도착역, 날짜를 모두 입력하세요.');
      btn.disabled = false;
      btn.textContent = '열차 조회';
      return;
    }
    try {
      const res  = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          dep,
          arr,
          date: toDateParam(date),
          from_time: toTimeParam(from),
          to_time: toTimeParam(to),
          train_type: trainType,
          passenger_count: passengerCount,
          login: { user_id: userId, password },
        }),
      });
      const data = await res.json();
      if (!res.ok) { showError('search-error', data.error || '조회 실패'); return; }
      saveCurrentLogin();
      trainData = data.trains;
      renderTrains(trainData);
      show('card-trains');
      show('card-options');
      $('card-trains').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (e) {
      showError('search-error', `네트워크 오류: ${e.message}`);
    } finally {
      btn.disabled = false;
      btn.textContent = '열차 조회';
    }
  }

  function renderTrains(trains) {
    $('train-count').textContent = `${trains.length}개 열차`;
    $('train-tbody').innerHTML = trains.map(t => {
      const isSoldOut = !t.has_general_seat && !t.has_special_seat && !t.has_waiting_list;
      const hasAvail  = t.has_general_seat || t.has_special_seat;
      const badge = hasAvail
        ? `<span class="badge badge-seat">${t.status}</span>`
        : t.has_waiting_list
          ? `<span class="badge badge-wait">${t.status}</span>`
          : `<span class="badge badge-sold">${t.status}</span>`;
      return `
        <tr>
          <td><input type="checkbox" class="train-chk" value="${t.train_id}" data-sold="${isSoldOut}" ${isSoldOut ? 'checked' : ''}></td>
          <td style="font-weight:700">${escHtml(t.train_no)}</td>
          <td>${escHtml(t.dep_time)}</td>
          <td>${escHtml(t.arr_time)}</td>
          <td>${badge}</td>
        </tr>`;
    }).join('');
  }

  function selectAll(checked) { document.querySelectorAll('.train-chk').forEach(c => c.checked = checked); }
  function selectSoldOnly()   { document.querySelectorAll('.train-chk').forEach(c => { c.checked = c.dataset.sold === 'true'; }); }

  // ── 스나이핑 시작 ─────────────────────────────────────────────────────────
  async function doStart() {
    const checked = [...document.querySelectorAll('.train-chk:checked')];
    if (!checked.length) { showError('start-error', '열차를 하나 이상 선택하세요.'); return; }
    hideError('start-error');

    // 알림 권한이 아직 없으면 한번 더 요청
    if ('Notification' in window && Notification.permission === 'default') {
      await requestNotifPermission();
    }

    const btn = $('btn-start');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 시작 중…';

    const interval = parseFloat($('interval').value) || 45;
    const passengerCount = clampPassengerCount($('passenger-count').value);
    $('passenger-count').value = passengerCount;
    const payload  = {
      dep:         $('dep').value.trim(),
      arr:         $('arr').value.trim(),
      date:        toDateParam($('date').value),
      from_time:   toTimeParam($('from-time').value),
      to_time:     toTimeParam($('to-time').value),
      train_ids:   checked.map(c => c.value),
      seat_option: $('seat-option').value,
      try_waiting: $('try-waiting').checked,
      interval:    Math.max(30, interval),
      passenger_count: passengerCount,
      train_type:  trainType,
    };
    try {
      const res  = await fetch('/api/snipe/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) {
        showError('start-error', data.error || '시작 실패');
        btn.disabled = false;
        btn.textContent = '🎯 스나이핑 시작';
        return;
      }
    } catch (e) {
      showError('start-error', `오류: ${e.message}`);
      btn.disabled = false;
      btn.textContent = '🎯 스나이핑 시작';
      return;
    }
    $('log-box').innerHTML = '';
    pollAttempt = 0;
    hide('card-success');
    show('card-log');
    $('dot').classList.add('running');
    $('card-log').scrollIntoView({ behavior: 'smooth', block: 'start' });
    startStream();
  }

  // ── SSE ──────────────────────────────────────────────────────────────────
  function startStream() {
    if (eventSource) eventSource.close();
    streamClosed = false;
    eventSource = new EventSource('/api/snipe/stream');
    eventSource.onmessage = e => { try { handleMsg(JSON.parse(e.data)); } catch (_) {} };
    eventSource.onerror   = () => {
      if (streamClosed) return;
      streamClosed = true;
      addLog('서버 연결 끊김', 'warn');
      stopStream('연결 끊김');
      resetStartBtn();
    };
  }

  function handleMsg(msg) {
    switch (msg.type) {
      case 'log':
        addLog(msg.msg, msg.level, msg.ts);
        break;
      case 'poll':
        pollAttempt = msg.attempt;
        $('poll-pill').textContent = `${msg.attempt}번째 조회`;
        break;
      case 'success':
        showSuccess(msg.reservation);
        sendBrowserNotification(msg.reservation);
        addLog('예약 성공 알림 완료. 추가 예매를 계속할 수 있습니다.', 'success');
        stopStream('예약 성공');
        resetStartBtn();
        break;
      case 'error':
        addLog(msg.msg, 'error');
        stopStream('오류');
        resetStartBtn();
        break;
      case 'done':
        addLog('스나이퍼 종료', 'warn');
        stopStream('종료');
        resetStartBtn();
        break;
    }
  }

  function stopStream(label = '종료') {
    streamClosed = true;
    if (eventSource) { eventSource.close(); eventSource = null; }
    $('dot').classList.remove('running');
    $('poll-pill').textContent = label;
    $('poll-pill').classList.remove('running');
  }

  function resetStartBtn() {
    const btn = $('btn-start');
    btn.disabled = false;
    btn.textContent = '🎯 스나이핑 시작';
  }

  function addLog(msg, level = 'info', ts = null) {
    const box  = $('log-box');
    const line = document.createElement('div');
    const time = ts || new Date().toTimeString().slice(0, 8);
    line.innerHTML = `<span class="log-ts">${escHtml(time)}</span>`
                   + `<span class="log-${level || 'info'}">${escHtml(msg)}</span>`;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
  }

  // ── 성공 카드 ─────────────────────────────────────────────────────────────
  function showSuccess(r) {
    show('card-success');
    $('success-body').innerHTML = `
      <div class="info-row">
        <span class="info-label">예약번호</span>
        <span class="info-value" style="color:var(--blue)">${escHtml(r.reservation_id)}</span>
      </div>
      <div class="info-row">
        <span class="info-label">열차</span>
        <span class="info-value">${escHtml(r.train_type)} ${escHtml(r.train_no)}</span>
      </div>
      <div class="info-row">
        <span class="info-label">구간</span>
        <span class="info-value">${escHtml(r.dep_name)} ${escHtml(r.dep_time)} → ${escHtml(r.arr_name)} ${escHtml(r.arr_time)}</span>
      </div>
      <div class="info-row">
        <span class="info-label">운임</span>
        <span class="info-value">${escHtml(String(r.price))}원</span>
      </div>
      <div class="info-row">
        <span class="info-label">결제 기한</span>
        <span class="info-value" style="color:var(--red)">${escHtml(r.buy_limit_date)} ${escHtml(r.buy_limit_time)}</span>
      </div>
    `;
    $('card-success').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── 중단 ─────────────────────────────────────────────────────────────────
  async function doStop() {
    await fetch('/api/snipe/stop', { method: 'POST' }).catch(() => {});
    stopStream();
    resetStartBtn();
  }

  // ── Enter 키 조회 ─────────────────────────────────────────────────────────
  ['dep','arr','date','from-time','to-time'].forEach(id => {
    $(id).addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
  });
  $('login-id').addEventListener('change', saveCurrentLogin);
  $('login-password').addEventListener('change', saveCurrentLogin);
  restoreLogin(trainType);
  restoreState();
</script>
</body>
</html>
